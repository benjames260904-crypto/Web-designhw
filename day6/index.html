<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phòng Khách Sạn</title>
    <meta name="description" content="Ứng dụng quản lý phòng khách sạn - Thêm mới và hiển thị phòng">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== FORM NHẬP DỮ LIỆU ===== -->
    <section class="form-section">
        <div class="form-container">
            <div class="form-header">
                <h1>Quản lý phòng</h1>
                <div class="form-actions">
                    <button class="btn btn-display" onclick="toggleDisplay()">
                        Hiển Thị
                    </button>
                    <button class="btn btn-add" onclick="addRoom()">
                        Thêm mới phòng
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-divider"></div>
            <div class="form-fields">
                <div class="field-group">
                    <label for="roomName">Tên phòng</label>
                    <input type="text" id="roomName" placeholder="Tên phòng" autocomplete="off">
                </div>
                <div class="field-group">
                    <label for="roomDesc">Mô tả phòng</label>
                    <input type="text" id="roomDesc" placeholder="Mô tả phòng" autocomplete="off">
                </div>
                <div class="field-group">
                    <label for="roomPrice">Giá</label>
                    <input type="number" id="roomPrice" placeholder="Giá phòng" autocomplete="off">
                </div>
                <div class="field-group field-image">
                    <button class="btn btn-image" onclick="document.getElementById('roomImage').click()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                        Chọn hình ảnh
                    </button>
                    <input type="file" id="roomImage" accept="image/*" hidden onchange="handleImageSelect(this)">
                    <span class="image-name" id="imageName"></span>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== XUẤT DỮ LIỆU ===== -->
    <section class="display-section" id="displaySection" style="display:none;">
        <div class="display-container">
            <div class="display-header">
                <h2>Book đi nào. Mãi bên nhau bạn nhé!</h2>
                <p>Top nơi ở sang chảnh đón hè đã sẵn sàng trên Travelcon. Book đi ngay nè.</p>
            </div>
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
